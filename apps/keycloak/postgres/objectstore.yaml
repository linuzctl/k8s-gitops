---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: backup-aistor
  namespace: keycloak
spec:
  configuration:
    destinationPath: s3://backup-cnpg/
    endpointURL: ${BACKUP_S3_URL}
    s3Credentials:
      accessKeyId:
        name: cnpg-s3-backup-credentials
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-s3-backup-credentials
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
  retentionPolicy: 30d
