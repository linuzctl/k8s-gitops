---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 20m
  driftDetection:
    mode: enabled
  chartRef:
    kind: OCIRepository
    name: flux-operator
    namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: Secret
      name: flux-web-client
      valuesKey: client-id
      targetPath: web.config.authentication.oauth2.clientID
    - kind: Secret
      name: flux-web-client
      valuesKey: client-secret
      targetPath: web.config.authentication.oauth2.clientSecret
  values:
    installCRDs: true
    web:
      enabled: true
      networkPolicy:
        create: false
      config:
        baseURL: https://flux.${DOMAIN}
        authentication:
          type: OAuth2
          oauth2:
            provider: OIDC
            issuerURL: https://auth.${DOMAIN}/realms/auth
            scopes:
              - openid
              - profile
              - email
              - offline_access
            impersonation:
              username: claims.preferred_username
              groups: claims.roles
      httpRoute:
        enabled: true
        parentRefs:
          - name: flux-operator
            namespace: flux-system
            kind: ListenerSet
            group: gateway.networking.k8s.io
        hostnames:
          - flux.${DOMAIN}
