---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: csi-driver-nfs
spec:
  interval: 20m
  driftDetection:
    mode: enabled
  chartRef:
    kind: OCIRepository
    name: csi-driver-nfs
    namespace: csi-driver-nfs
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    controller:
      replicas: 2
    externalSnapshotter:
      enabled: false
      customResourceDefinitions:
        enabled: false
    volumeSnapshotClass:
      create: true
      name: csi-nfs-snapclass
      deletionPolicy: Delete
    storageClasses:
      - name: nfs-delete
        parameters:
          server: ${NFS_IP}
          share: ${NFS_SHARE}
        mountPermissions: "0777"
        reclaimPolicy: Delete
        volumeBindingMode: Immediate
        mountOptions:
          - nfsvers=4.1
      - name: nfs-retain
        parameters:
          server: ${NFS_IP}
          share: ${NFS_SHARE}
        mountPermissions: "0777"
        reclaimPolicy: Retain
        volumeBindingMode: Immediate
        mountOptions:
          - nfsvers=4.1
