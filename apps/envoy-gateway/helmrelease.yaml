---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  interval: 20m
  driftDetection:
    mode: enabled
  dependsOn:
    - name: cilium
      namespace: kube-system
    - name: cert-manager
      namespace: cert-manager
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
    namespace: envoy-gateway-system
  install:
    crds: Skip
  upgrade:
    crds: Skip
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    config:
      envoyGateway:
        logging:
          level:
            default: debug
