---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-blackbox-exporter
  namespace: monitoring
spec:
  interval: 20m
  driftDetection:
    mode: enabled
  chartRef:
    kind: OCIRepository
    name: prometheus-blackbox-exporter
    namespace: monitoring
  values:
    pspEnabled: false
    config:
      modules:
        http_2xx_higher_timeout:
          prober: http
          timeout: 30s
          http:
            valid_http_versions: ["HTTP/1.1", "HTTP/2.0", "HTTP/3"]
            follow_redirects: true
    serviceMonitor:
      enabled: true
      defaults:
        interval: 15m
        scrapeTimeout: 30s
        follow_redirects: false
      targets:
        - name: gitlab
          url: https://git.${DOMAIN}/health_check
        - name: gitlab-aistor
          url: https://aistor.git.${DOMAIN}/minio/health/live
        - name: gitlab-registry
          url: https://registry.git.${DOMAIN}
        - name: rook-ceph
          url: https://rook-ceph.${DOMAIN}
        - name: keycloak
          url: https://auth.${DOMAIN}
        - name: outline
          url: https://outline.${DOMAIN}
        - name: outline-aistor
          url: https://aistor.outline.${DOMAIN}/minio/health/live
        - name: vault
          url: https://vault.${DOMAIN}/api/alive
        - name: ocis
          url: https://ocis.${DOMAIN}/healthz
        - name: drawio
          url: https://drawio.${DOMAIN}
        - name: grafana
          url: https://grafana.${DOMAIN}
        - name: prometheus
          url: https://prometheus.${DOMAIN}
        - name: pdf
          url: https://pdf.${DOMAIN}
        - name: alertmanager
          url: https://alertmanager.${DOMAIN}
        - name: prometheus-blackbox
          url: https://blackbox.${DOMAIN}
    prometheusRule:
      enabled: true
      rules:
        - alert: SSLCertExpiringSoon
          expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 29
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: |-
              SSL certificate «{{ $labels.instance }}» expires soon
            description: |-
              SSL certificate will expire in {{ $value | humanizeDuration }} (instance {{ $labels.instance }})
        - alert: BlackboxProbeFailed
          expr: last_over_time(probe_success[15m]) == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Host is unreachable
            description: The host «{{ $labels.target }}» is currently unreachable
