---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-cnpg-dashboard
  namespace: cnpg-system
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  url: https://raw.githubusercontent.com/cloudnative-pg/grafana-dashboards/refs/tags/cluster-v0.0.5/charts/cluster/grafana-dashboard.json
