---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: stalwart-postgres
  namespace: stalwart
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3
  storage:
    storageClass: ceph-block
    size: 5Gi
  walStorage:
    storageClass: ceph-block
    size: 1Gi
  bootstrap:
    initdb:
      database: stalwart
      owner: stalwart
  enablePDB: false
