---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
    namespace: envoy-gateway-system
  listeners:
    - name: vault
      hostname: vault.${DOMAIN}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: vault-${DOMAIN/./-}-tls
