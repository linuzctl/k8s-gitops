---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dragonfly-operator
  namespace: flux-system
spec:
  dependsOn:
    - name: crds
  interval: 1h
  path: ./apps/dragonfly-operator
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: dragonfly-operator-system
