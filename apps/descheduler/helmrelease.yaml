---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: descheduler
spec:
  interval: 20m
  driftDetection:
    mode: enabled
  chartRef:
    kind: OCIRepository
    name: descheduler
    namespace: descheduler
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    kind: Deployment
    serviceMonitor:
      enabled: true
