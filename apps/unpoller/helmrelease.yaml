---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unpoller
  namespace: unpoller
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: unpoller
    namespace: unpoller
  install:
    crds: Skip
  upgrade:
    crds: Skip
  valuesFrom:
    - kind: Secret
      name: unpoller-helm-values
  values:
    dashboards:
      create: false
      grafana:
        create: false
