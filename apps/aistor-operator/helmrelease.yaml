---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aistor-operator
  namespace: aistor-operator
spec:
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: aistor-operator
      version: 5.6.0
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: Secret
      name: aistor-operator-values
  values:
    global:
      operator:
        extraEnv:
          - name: PROMETHEUS_NAMESPACE
            value: "monitoring"
          - name: PROMETHEUS_NAME
            value: "kube-prometheus-stack-prometheus"
