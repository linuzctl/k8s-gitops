---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unpoller
  namespace: unpoller
spec:
  interval: 5m
  chart:
    spec:
      chart: unpoller
      version: 2.1.0
      sourceRef:
        kind: HelmRepository
        name: unpoller
        namespace: flux-system
      interval: 10m
  valuesFrom:
    - kind: Secret
      name: unpoller-helm-values
  values:
    dashboards:
      create: false
      grafana:
        create: false
