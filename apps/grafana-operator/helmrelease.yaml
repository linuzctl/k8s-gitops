---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
  namespace: grafana-operator
spec:
  interval: 20m
  driftDetection:
    mode: enabled
  chartRef:
    kind: OCIRepository
    name: grafana-operator
    namespace: grafana-operator
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    dashboard:
      enabled: true
    serviceMonitor:
      enabled: true
