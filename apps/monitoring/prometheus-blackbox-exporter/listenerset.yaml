---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: prometheus-blackbox-exporter
  namespace: monitoring
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
    namespace: envoy-gateway-system
  listeners:
    - name: prometheus-blackbox-exporter
      hostname: blackbox.${DOMAIN}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: blackbox-${DOMAIN/./-}-tls
