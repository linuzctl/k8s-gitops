---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: flux-operator
  namespace: flux-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
    namespace: envoy-gateway-system
  listeners:
    - name: flux-operator
      hostname: flux.${DOMAIN}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: flux-${DOMAIN/./-}-tls
