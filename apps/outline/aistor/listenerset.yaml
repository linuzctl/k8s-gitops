---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: outline-aistor
  namespace: outline
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  parentRef:
    namespace: envoy-gateway-system
    name: envoy-gateway
    kind: Gateway
    group: gateway.networking.k8s.io
  listeners:
    - name: outline-aistor
      hostname: aistor.outline.${DOMAIN}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: aistor-outline-${DOMAIN/./-}-tls
    - name: outline-aistor-console
      hostname: console.aistor.outline.${DOMAIN}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: console-aistor-outline-${DOMAIN/./-}-tls
