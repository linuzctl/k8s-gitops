---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
    namespace: envoy-gateway-system
  listeners:
    - name: rook-ceph
      hostname: rook-ceph.${DOMAIN}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: rook-ceph-${DOMAIN/./-}-tls
