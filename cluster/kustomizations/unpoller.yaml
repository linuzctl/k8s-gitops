---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unpoller
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/unpoller
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: v1
kind: Namespace
metadata:
  name: unpoller
