---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: grafana
  namespace: grafana
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
    namespace: envoy-gateway-system
  listeners:
    - name: grafana
      hostname: grafana.${DOMAIN}
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - kind: Secret
            name: grafana-${DOMAIN/./-}-tls
