---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: drawio
  namespace: drawio
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
    namespace: envoy-gateway-system
  listeners:
    - name: drawio
      hostname: drawio.${DOMAIN}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: drawio-${DOMAIN/./-}-tls
