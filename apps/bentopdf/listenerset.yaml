---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: bentopdf
  namespace: bentopdf
spec:
  parentRef:
    namespace: envoy-gateway-system
    name: envoy-gateway
    kind: Gateway
    group: gateway.networking.k8s.io
  listeners:
    - name: bentopdf
      hostname: pdf.${DOMAIN}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: pdf-${DOMAIN/./-}-tls
