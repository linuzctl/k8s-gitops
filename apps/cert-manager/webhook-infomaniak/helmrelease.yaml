---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infomaniak-webhook
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: deploy/infomaniak-webhook
      sourceRef:
        kind: GitRepository
        name: infomaniak-webhook
  values:
    secretsNames:
      - infomaniak-api-credentials
